spring:
  datasource:
    url: jdbc:mysql://localhost:3306/social_network?createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # File Upload Config
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: social-network-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ElasticSearch Configuration
  elasticsearch:
    uris: http://localhost:9200

  # Redis Configuration (Cache + Rate Limiting)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # OAuth2 Configuration (Google)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your_dev_client_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your_dev_client_secret}
            scope:
              - email
              - profile

  # Mail Configuration (Local: log to console, Deploy: use Gmail SMTP)
  mail:
    host: localhost
    port: 1025
    username: noreply@social-network.local
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  forward-headers-strategy: framework

